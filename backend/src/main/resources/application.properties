# Database Configuration
# NOTE: Use transaction mode pooler for better connection handling
# Session mode: limited to 15 connections
# Transaction mode: supports 200+ connections
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-eu-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.fnoauuxhjcbvervhkdba}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ventilo-1478951}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Optimizations for faster startup
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CRITICAL: Enable Lazy Initialization for faster startup
spring.main.lazy-initialization=true

# Disable unnecessary features for faster startup
spring.jmx.enabled=false
spring.devtools.restart.enabled=false

# Security
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
server.tomcat.connection-timeout=20000
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# Actuator for health checks (optional but recommended for Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
