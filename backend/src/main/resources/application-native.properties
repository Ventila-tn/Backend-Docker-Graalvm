# Native Image Configuration
# This profile is used when running as a GraalVM Native Image

# Database Configuration - Same as production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Minimal for native
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3

# JPA - Production settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Native Image Specific - NO lazy initialization for AOT
spring.main.lazy-initialization=false

# AOT Processing enabled
spring.aot.enabled=true

# Disable unnecessary features
spring.jmx.enabled=false
spring.devtools.restart.enabled=false

# Security
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
server.tomcat.connection-timeout=20000
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.ecommerce.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
